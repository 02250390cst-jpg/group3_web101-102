name: Deploy to Render and Railway

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy Backend (Railway) ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway deploy (Backend)
        run: |
          curl --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://backboard.railway.app/graphql/v2" \
            -d '{"query": "mutation { deploymentTrigger(input: { serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\" }) { id } }"}'

  # ── Deploy Frontend (Render) ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy (Frontend)
        run: |
          curl --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys"
