name: Deploy to Render
 
on:
  push:
    branches:
      - main          # trigger on every push to main
 
jobs:
  # Deploy Backend
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
 
    steps:
      - name: Trigger Render deploy (Backend)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
 
  # Deploy Frontend 
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
 
    steps:
      - name: Trigger Render deploy (Frontend)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
